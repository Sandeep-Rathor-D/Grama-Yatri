# Project-wide Gradle settings.

# JVM arguments for Gradle daemon
# Optimized for 8GB RAM laptop
org.gradle.jvmargs=-Xmx2048m -XX:+HeapDumpOnOutOfMemoryError -Dfile.encoding=UTF-8 -XX:+UseG1GC

# Parallel builds
org.gradle.parallel=true

# Enable build cache
org.gradle.caching=true

# Keep daemon alive
org.gradle.daemon=true

# AndroidX
android.useAndroidX=true

# Disable Jetifier (not needed for new projects)
android.enableJetifier=false

# Kotlin incremental compilation
kotlin.incremental=true

# Non-transitive R class (recommended for new projects)
android.nonTransitiveRClass=true

# Suppress warnings
android.suppressUnsupportedOptionWarnings=android.enableJetifier